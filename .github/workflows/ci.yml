name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  POETRY_VERSION: "1.8.3"
  POETRY_VIRTUALENVS_IN_PROJECT: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-lint-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --all-extras --no-interaction

      - name: Ruff (lint)
        run: poetry run ruff check src tests

      - name: Mypy (strict)
        run: poetry run mypy src

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-test-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --all-extras --no-interaction

      - name: Run tests with coverage
        run: poetry run pytest --cov=aevs --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install dependencies
        run: poetry install --all-extras --no-interaction

      - name: Assert pyproject version matches aevs.__version__
        # Belt-and-braces: catches drift even if `_version.py` is hand-edited
        # or `importlib.metadata` falls back to its dev sentinel.
        run: |
          PYPROJECT_VERSION="$(poetry version -s)"
          PACKAGE_VERSION="$(poetry run python -c 'import aevs; print(aevs.__version__)')"
          echo "pyproject: $PYPROJECT_VERSION"
          echo "package:   $PACKAGE_VERSION"
          test "$PYPROJECT_VERSION" = "$PACKAGE_VERSION"

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, test, version-consistency]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install "poetry==${{ env.POETRY_VERSION }}"

      - name: Build distributions
        run: poetry build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
